name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'

jobs:
  # ─────────────────────────────────────
  # Install & Cache Dependencies
  # ─────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  # ─────────────────────────────────────
  # Format Check
  # ─────────────────────────────────────
  format:
    name: Format Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format:check

  # ─────────────────────────────────────
  # Lint
  # ─────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm --filter @hrms/api exec prisma generate
      - name: Run ESLint
        run: pnpm lint

  # ─────────────────────────────────────
  # TypeScript Type Check
  # ─────────────────────────────────────
  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm --filter @hrms/api exec prisma generate
      - name: Run type checking
        run: pnpm type-check

  # ─────────────────────────────────────
  # Tests (with real PostgreSQL + Redis)
  # ─────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hrms_test
          POSTGRES_USER: hrms_user
          POSTGRES_PASSWORD: hrms_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @hrms/api exec prisma generate

      - name: Run Prisma migrations on test DB
        run: pnpm --filter @hrms/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://hrms_user:hrms_password@localhost:5432/hrms_test
          DIRECT_URL: postgresql://hrms_user:hrms_password@localhost:5432/hrms_test

      - name: Run tests with coverage
        run: pnpm test:coverage
        env:
          DATABASE_URL: postgresql://hrms_user:hrms_password@localhost:5432/hrms_test
          DIRECT_URL: postgresql://hrms_user:hrms_password@localhost:5432/hrms_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-exactly-64-chars-padded-for-validation-ok
          JWT_REFRESH_SECRET: ci-test-refresh-secret-exactly-64-chars-padded-for-valid
          NODE_ENV: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────
  # Build (validates all packages build clean)
  # Only runs after all checks pass
  # ─────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [format, lint, type-check, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm --filter @hrms/api exec prisma generate
      - name: Build all packages
        run: pnpm build
        env:
          VITE_API_URL: https://api.hrmsplatform.com/api/v1
          VITE_WS_URL: wss://api.hrmsplatform.com
          VITE_APP_NAME: HRMS Platform
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: apps/web/dist/
          retention-days: 7
