name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10"

jobs:
  # ─────────────────────────────────────
  # Deploy API → Railway
  # ─────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        run: railway up --service hrms-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─────────────────────────────────────
  # Deploy Web → Vercel
  # ─────────────────────────────────────
  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-api]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @hrms/web build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_APP_NAME: HRMS Platform

      - name: Deploy to Vercel
        run: |
          pnpm add -g vercel
          vercel --cwd apps/web --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─────────────────────────────────────
  # Post-Deploy: Run smoke tests
  # ─────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - uses: actions/checkout@v4
      - name: API health check
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            "${{ secrets.API_BASE_URL }}/api/v1/health"
      - name: Web health check
        run: |
          curl --fail --retry 3 --retry-delay 5 \
            "${{ secrets.WEB_APP_URL }}"
