name: hrms-platform

# ============================================================
# HRMS Local Development Infrastructure
# ============================================================
# Start all services:   docker compose up -d
# Stop all services:    docker compose down
# View logs:            docker compose logs -f
# Reset all data:       docker compose down -v
#
# Service URLs:
#   PostgreSQL:         localhost:5432
#   Redis:              localhost:6379
#   pgAdmin (DB GUI):   http://localhost:5050  (admin@hrms.local / admin)
#   Redis UI:           http://localhost:8081
# ============================================================

services:

  # ─────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hrms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hrms_db
      POSTGRES_USER: hrms_user
      POSTGRES_PASSWORD: hrms_password
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms_user -d hrms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hrms_network

  # ─────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hrms_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass hrms_redis_password
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "hrms_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hrms_network

  # ─────────────────────────────────────
  # pgAdmin 4 — PostgreSQL GUI
  # Login: admin@hrms.local / admin
  # ─────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hrms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hrms.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./scripts/db/pgadmin-servers.json:/pgadmin4/servers.json:ro
    networks:
      - hrms_network

  # ─────────────────────────────────────
  # Redis Commander — Redis GUI
  # Access at: http://localhost:8081
  # ─────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hrms_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:hrms_redis_password"
      HTTP_USER: admin
      HTTP_PASSWORD: admin
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hrms_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  hrms_network:
    driver: bridge
    name: hrms_network
