[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @hrms/api exec prisma generate && pnpm --filter @hrms/shared-utils run build && pnpm --filter @hrms/api run build"

[deploy]
startCommand = "node apps/api/dist/server.js"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
