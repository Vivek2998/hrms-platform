name: hrms_mobile
description: HRMS Platform — Employee mobile app (attendance, leaves, payslips)
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

  # ─────────────────────────────────────
  # State Management
  # ─────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ─────────────────────────────────────
  # Navigation
  # ─────────────────────────────────────
  go_router: ^14.6.3

  # ─────────────────────────────────────
  # Offline Storage (Isar — faster than Hive)
  # ─────────────────────────────────────
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # ─────────────────────────────────────
  # HTTP & API
  # ─────────────────────────────────────
  dio: ^5.7.0

  # ─────────────────────────────────────
  # Auth & Security
  # ─────────────────────────────────────
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  # ─────────────────────────────────────
  # Push Notifications (FCM)
  # ─────────────────────────────────────
  firebase_core: ^3.8.0
  firebase_messaging: ^15.2.0

  # ─────────────────────────────────────
  # Location (GPS for attendance punch-in)
  # ─────────────────────────────────────
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # ─────────────────────────────────────
  # Geofence + Local Notifications (smart punch-in)
  # ─────────────────────────────────────
  geofence_service: ^6.0.0+1
  flutter_local_notifications: ^18.0.0

  # ─────────────────────────────────────
  # Camera (selfie for punch-in)
  # ─────────────────────────────────────
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # ─────────────────────────────────────
  # UI & Utilities
  # ─────────────────────────────────────
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  open_filex: ^4.6.0
  connectivity_plus: ^6.1.1
  package_info_plus: ^8.1.3


dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.3.2
  isar_generator: ^3.1.0+1
  json_serializable: ^6.8.0
  json_annotation: ^4.8.1

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

