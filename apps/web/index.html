<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="HRMS Platform — Complete HR Management for Indian Businesses"
    />
    <title>HRMS Platform</title>
    <!-- Apply saved theme before React hydrates to prevent white flash -->
    <script>
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem('hrms-ui') || '{}');
          var theme = (stored.state && stored.state.theme) || 'system';
          var root = document.documentElement;
          if (theme === 'system') {
            var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            root.classList.add(isDark ? 'dark' : 'light');
          } else {
            root.classList.add(theme);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
