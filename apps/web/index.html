<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="HRMS Platform — Complete HR Management for Indian Businesses"
    />
    <title>HRMS Platform</title>
    <!-- Apply saved theme before React hydrates to prevent flash. Default is always light — never follow OS dark mode. -->
    <script>
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem('hrms-ui') || '{}');
          var theme = (stored.state && stored.state.theme) || 'light';
          document.documentElement.classList.add(theme === 'dark' ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
